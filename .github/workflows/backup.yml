name: Supabase Nightly Backup

on:
  schedule:
    # Ogni notte alle 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Permette di eseguire il backup manualmente dalla UI di GitHub Actions

jobs:
  backup:
    name: Export & Archive DB
    runs-on: ubuntu-latest

    steps:
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Export database dump
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase db dump --project-ref gkbxiyzmtrxukpoaqdqn -f "backup_$(date +%Y%m%d_%H%M%S).sql"

      - name: Upload backup as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: backup_*.sql
          # Conserva per 90 giorni (max sul piano Free di GitHub)
          retention-days: 90
          if-no-files-found: error
