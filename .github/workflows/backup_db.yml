name: 🗄️ Daily DB Backup

on:
  schedule:
    # Ogni notte alle 02:30 UTC
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Eseguibile manualmente dalla UI di GitHub Actions

env:
  PROJECT_REF: gkbxiyzmtrxukpoaqdqn
  # Connection string via Supabase pooler (Transaction mode, port 5432)
  # Formato: postgresql://postgres.[ref]:[password]@aws-0-eu-west-1.pooler.supabase.com:5432/postgres

jobs:
  backup-db:
    name: Full DB Dump (schema + dati completi)
    runs-on: ubuntu-latest

    steps:
      - name: Installa postgresql-client (pg_dump)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client

      - name: Imposta timestamp condiviso
        run: echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      # ── 1. SCHEMA completo (DDL) via pg_dump ────────────────────────────
      - name: Dump schema DDL (public + auth)
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            --host=aws-0-eu-west-1.pooler.supabase.com \
            --port=5432 \
            --username=postgres.${PROJECT_REF} \
            --dbname=postgres \
            --schema-only \
            --no-owner \
            --no-acl \
            --schema=public \
            --schema=auth \
            --file="schema_${TIMESTAMP}.sql"

          echo "=== Schema dump size ==="
          du -sh "schema_${TIMESTAMP}.sql"

      # ── 2. DATI completi (DML) via pg_dump ──────────────────────────────
      - name: Dump dati (public + auth — tutti i record)
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            --host=aws-0-eu-west-1.pooler.supabase.com \
            --port=5432 \
            --username=postgres.${PROJECT_REF} \
            --dbname=postgres \
            --data-only \
            --no-owner \
            --no-acl \
            --schema=public \
            --schema=auth \
            --file="data_${TIMESTAMP}.sql"

          echo "=== Data dump size ==="
          du -sh "data_${TIMESTAMP}.sql"

          echo "=== Righe per tabella (anteprima) ==="
          grep -c "^INSERT" "data_${TIMESTAMP}.sql" || echo "0 INSERT statements"

      # ── 3. Compressione & upload ─────────────────────────────────────────
      - name: Comprimi i dump
        run: |
          DATE=$(date +%Y%m%d)
          zip "db_backup_${DATE}.zip" schema_*.sql data_*.sql
          
          echo "=== Backup finale ==="
          du -sh "db_backup_${DATE}.zip"

      - name: Upload artifact su GitHub
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: db_backup_*.zip
          # 90 giorni (max piano Free GitHub)
          retention-days: 90
          if-no-files-found: error
