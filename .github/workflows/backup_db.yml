name: 🗄️ Daily DB Backup

on:
  schedule:
    # Ogni notte alle 02:30 UTC
    - cron: '30 2 * * *'
  workflow_dispatch:

env:
  PROJECT_REF: gkbxiyzmtrxukpoaqdqn
  SUPABASE_URL: https://gkbxiyzmtrxukpoaqdqn.supabase.co

jobs:
  backup-db:
    name: Full DB Dump (schema + dati completi)
    runs-on: ubuntu-latest

    steps:
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Imposta timestamp condiviso
        run: echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      - name: Link progetto Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${PROJECT_REF} --yes -p "$DB_PASSWORD"

      # ── 1. SCHEMA (DDL) ──────────────────────────────────────────────────
      - name: Dump schema DDL (public)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db dump --linked -p "$DB_PASSWORD" \
            -f "schema_${TIMESTAMP}.sql"

          echo "=== Schema size ===" && du -sh "schema_${TIMESTAMP}.sql"

      # ── 2. DATI public (DML) ─────────────────────────────────────────────
      - name: Dump dati tabelle public
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db dump --linked -p "$DB_PASSWORD" \
            --data-only \
            -f "data_${TIMESTAMP}.sql"

          echo "=== Data size ===" && du -sh "data_${TIMESTAMP}.sql"

      # ── 3. AUTH USERS via Admin API ───────────────────────────────────────
      # pg_dump non funziona su GitHub Actions (port 5432 bloccato da Supabase).
      # Usiamo l'Admin REST API con la service_role key per esportare gli utenti.
      - name: Export auth.users (Admin API)
        env:
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Pagina 1 (max 1000 utenti per chiamata)
          curl -s \
            "${SUPABASE_URL}/auth/v1/admin/users?page=1&per_page=1000" \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            -H "apikey: ${SERVICE_ROLE_KEY}" \
            -o "auth_users_${TIMESTAMP}.json"

          echo "=== Auth users export ==="
          cat "auth_users_${TIMESTAMP}.json" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(f'Utenti esportati: {len(d.get(\"users\",[]))}')"

      # ── 4. Compressione & upload ──────────────────────────────────────────
      - name: Comprimi tutto
        run: |
          DATE=$(date +%Y%m%d)
          zip "db_backup_${DATE}.zip" \
            schema_*.sql \
            data_*.sql \
            auth_users_*.json

          echo "=== Backup finale ===" && du -sh "db_backup_${DATE}.zip"

      - name: Upload artifact su GitHub
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: db_backup_*.zip
          retention-days: 90
          if-no-files-found: error
