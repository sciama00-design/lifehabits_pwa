name: 📦 Weekly Storage Backup

on:
  schedule:
    # Ogni domenica alle 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  PROJECT_REF: gkbxiyzmtrxukpoaqdqn
  BUCKET_NAME: media
  FOLDER_PREFIX: uploads

jobs:
  backup-storage:
    name: Download & Archive Storage Bucket
    runs-on: ubuntu-latest

    steps:
      - name: Installa dipendenze (curl, jq, zip)
        run: sudo apt-get install -y curl jq zip

      - name: Scarica lista file dal bucket
        env:
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p "media_backup/${FOLDER_PREFIX}"

          # L'API /list restituisce i nomi SENZA il prefisso (solo il filename)
          # Usiamo il prefisso "uploads/" per listare solo quella cartella
          curl -s \
            -X POST \
            "https://${PROJECT_REF}.supabase.co/storage/v1/object/list/${BUCKET_NAME}" \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"limit\": 1000, \"offset\": 0, \"prefix\": \"${FOLDER_PREFIX}/\"}" \
            -o objects.json

          echo "=== Risposta API lista ==="
          cat objects.json | jq '.'

          echo "=== Nomi file trovati ==="
          cat objects.json | jq -r '.[].name'
          
          TOTAL=$(cat objects.json | jq '. | length')
          echo "Totale oggetti: ${TOTAL}"

      - name: Scarica tutti i file
        env:
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          NAMES=$(cat objects.json | jq -r '.[].name')
          SUCCESS=0
          FAILED=0

          for NAME in $NAMES; do
            # L'API restituisce solo il filename (es. "foto.jpg")
            # Il path completo nel bucket è: uploads/foto.jpg
            FULL_PATH="${FOLDER_PREFIX}/${NAME}"
            LOCAL_PATH="media_backup/${FULL_PATH}"
            
            mkdir -p "$(dirname "$LOCAL_PATH")"

            echo "Scaricando: ${FULL_PATH}"
            
            # Controlla il HTTP status code, non scrivere se errore
            HTTP_STATUS=$(curl -s -o "$LOCAL_PATH" \
              -w "%{http_code}" \
              -L \
              "https://${PROJECT_REF}.supabase.co/storage/v1/object/${BUCKET_NAME}/${FULL_PATH}" \
              -H "Authorization: Bearer ${SERVICE_ROLE_KEY}")

            if [ "$HTTP_STATUS" = "200" ]; then
              SIZE=$(du -sh "$LOCAL_PATH" | cut -f1)
              echo "  ✅ OK (${SIZE}, HTTP ${HTTP_STATUS})"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ ERRORE HTTP ${HTTP_STATUS} per ${FULL_PATH}"
              # Mostra la risposta di errore per debug
              cat "$LOCAL_PATH"
              rm -f "$LOCAL_PATH"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== Riepilogo download ==="
          echo "✅ Successi: ${SUCCESS}"
          echo "❌ Falliti:  ${FAILED}"
          
          # Mostra dimensione totale cartella
          du -sh media_backup/

      - name: Comprimi il backup
        run: |
          TIMESTAMP=$(date +%Y%m%d)
          
          FILE_COUNT=$(find media_backup -type f | wc -l)
          echo "File da comprimere: ${FILE_COUNT}"
          
          zip -r "storage_backup_${TIMESTAMP}.zip" media_backup/
          
          echo "=== Backup finale ===" && du -sh "storage_backup_${TIMESTAMP}.zip"

      - name: Upload artifact su GitHub
        uses: actions/upload-artifact@v4
        with:
          name: storage-backup-${{ github.run_id }}
          path: storage_backup_*.zip
          retention-days: 90
          if-no-files-found: error
